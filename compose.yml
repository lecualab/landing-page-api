---
services:
  main:
    build:
      dockerfile: ./.devcontainer/Dockerfile
    ports:
      - ${PORT:-3000}:${PORT:-3000}
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
  dbms:
    image: dpage/pgadmin4
    ports:
      - 5050:80
    volumes:
      - dbms-data:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin

volumes:
  node_modules:
  dbms-data:
